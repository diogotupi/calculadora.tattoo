<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Capaz Calculator</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg?v=2">
<link rel="shortcut icon" href="./favicon.svg?v=2">

<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
.header {
  text-align: center;
  margin-bottom: 30px;
}

.header img {
  width: 70px;          /* 🔥 menor = mais elegante */
  height: auto;
  display: block;
  margin: 0 auto 12px auto;

  opacity: 0.85;
  filter: brightness(0) invert(1); /* 🔥 deixa branca se for preta */
}
body {
  font-family: 'Jost', sans-serif;
  background: #131313;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
  min-height: 100vh;
  position: relative;
}

.logo-corner {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  width: 250px;
  height: auto;
  opacity: 0.92;
  filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.45));
  z-index: 20;
}

@media (max-width: 640px) {
  .logo-corner {
    position: absolute;
    width: 234px;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0.8;
  }

  .container {
    margin-top: 128px;
  }
}

.container {
  width: 100%;
  max-width: 500px;
  margin-top: 100px;
}

.card {
  background: #1a1a1a;
  padding: 18px;
  overflow: hidden;
  border-radius: 16px;
  margin-bottom: 15px;
}

input, select, button {
  width: 100%;
  display: block;
  padding: 14px 16px;
  margin-top: 8px;

  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);

  background: rgba(255,255,255,0.03);
  color: #fff;
  font-size: 16px;

  outline: none;
  transition: all 0.2s ease;

  box-sizing: border-box; /* 🔥 ESSENCIAL */
}

.card label {
  display: block;
}

.card input + label {
  margin-top: 14px;
}

button {
  background: #ececec;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}

.big {
  font-size: 20px;
  font-weight: bold;
}

.sub {
  opacity: 0.7;
}

select {
  background-color: #111 !important;
  color: #fff !important;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;

  background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 12px center;
  background-size: 18px;

  padding-right: 40px; /* espaço pra setinha */
}
</style>
</head>

<body>
<img
  class="logo-corner"
  src="./logo.PNG"
  alt="Logo Capaz"
>

<div class="container">

<div class="card">
  <label>Quanto você quer ganhar</label>
  <input type="text" id="lucro" placeholder="Ex: 1000">

  <label>Parcelamento</label>
  <select id="parcelas">
    <option value="1">1x</option>
    <option value="2">2x</option>
    <option value="3">3x</option>
    <option value="4" selected>4x</option>
    <option value="5">5x</option>
    <option value="6">6x</option>
    <option value="7">7x</option>
    <option value="8">8x</option>
    <option value="9">9x</option>
    <option value="10">10x</option>
    <option value="11">11x</option>
    <option value="12">12x</option>
  </select>

  <button onclick="calcular()">Calcular</button>
</div>

<div id="resultado"></div>

</div>

<script>
  const taxas = {
    1: 0.042,
    2: 0.0609,
    3: 0.0701,
    4: 0.0791,
    5: 0.088,
    6: 0.0967,
    7: 0.1259,
    8: 0.1342,
    9: 0.1425,
    10: 0.1506,
    11: 0.1587,
    12: 0.1666
  };
  
  function formatar(v) {
    return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }
  
  function calcular() {
    let L = parseFloat(document.getElementById("lucro").value.replace(",", "."));
    let parcelas = parseInt(document.getElementById("parcelas").value);
  
    if (!L) return;
  
    let taxaEstudio = 0.35;
    let taxaMaquina = taxas[parcelas];
  
    // 🔥 VALOR BASE (PIX)
    let base = L / (1 - taxaEstudio);
  
    // 💳 VALOR PARCELADO (apenas adiciona taxa da máquina)
    let parcelado = base / (1 - taxaMaquina);
  
    let valorParcela = parcelado / parcelas;
  
    // 🏢 Estúdio (sempre sobre o base)
    let valorEstudio = base * taxaEstudio;
  
    // 🏦 Taxa máquina (diferença real)
    let valorTaxa = parcelado - base;
  
    document.getElementById("resultado").innerHTML = `
  
  <div class="card">
    <div class="big">💳 Valor Total:</div>
    <div>${formatar(parcelado)}</div>
    <div class="sub">${parcelas}x de ${formatar(valorParcela)}</div>
  </div>

  <div class="card">
    <div class="big">💸 À vista (com desconto):</div>
    <div>${formatar(base)}</div>
  </div>

  <div class="card">
    <div class="big">🏦 Taxa do link Infinite Pay:</div>
    <div>${formatar(valorTaxa)}</div>
  </div>

  <div class="card">
    <div class="big">🏢 Comissão do estúdio:</div>
    <div>${formatar(valorEstudio)}</div>
  </div>

`;
  }
  </script>

</body>
</html>
